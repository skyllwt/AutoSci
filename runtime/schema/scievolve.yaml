# scievolve.yaml - Proposal-first evolution contract.
#
# SciEvolve converts feedback signals from user, task, and open environments
# into inspectable proposals for three dimensions:
#   memory        -> /dream
#   workflow      -> /forge
#   orchestration -> /morph
#
# This file documents the on-disk contract used by
# `tools/research_wiki.py scievolve-*`. It is intentionally append-friendly
# JSONL so reviewers and agents can inspect the evolution loop directly.

storage:
  root: wiki/outputs/evolution/
  signals: wiki/outputs/evolution/signals.jsonl
  proposal_index: wiki/outputs/evolution/proposals.jsonl
  proposal_artifacts: wiki/outputs/evolution/proposals/
  applications: wiki/outputs/evolution/applications.jsonl
  reports: wiki/outputs/evolution/reports/
  dream_runs: wiki/outputs/evolution/dream/

signal:
  required_fields:
    id: stable signal id
    timestamp: UTC ISO-8601 timestamp
    source: user | task | open
    dimension: memory | workflow | orchestration
    skill: /dream | /forge | /morph
    target: entity slug, skill name, DAG/template name, or blank
    kind: correction | failure | warning | success | cost | review | experiment | external-update | other
    summary: short human-readable signal summary
    confidence: low | medium | high
    severity: info | low | medium | high | critical
    status: recorded
  optional_fields:
    evidence_path: path to supporting artifact
    evidence_text: short supporting quote or note
  injection_paths:
    skill_explicit: skills call tools/scievolve_record.py at end of execution
    manual_cli: human calls tools/research_wiki.py scievolve-record-signal

proposal:
  required_fields:
    id: deterministic proposal id for a signal group
    created_at: UTC ISO-8601 timestamp
    dimension: memory | workflow | orchestration
    skill: /dream | /forge | /morph
    target: target inherited from the signal group
    triggering_signals: list of signal ids
    proposed_action: proposal-first update description
    rationale: why the signals justify review
    risk: risk / apply caution
    status: proposed | approved | applied | rejected | superseded
    output_path: Markdown artifact path
    json_path: JSON artifact path
  optional_fields:
    proposal_kind: forgetting | consolidation | association | review
    confidence: low | medium | high
    related_entities: list of cited context entity ids involved in the proposal
    evidence: list of cited signal/entity/candidate/edge evidence records
    agent_trace: prompt/response/model metadata for agent-mediated proposals
    application: application event when status is applied

dream:
  mode: agent-first
  artifacts:
    context_json: wiki/outputs/evolution/dream/<run>/dream_context.json
    context_markdown: wiki/outputs/evolution/dream/<run>/dream_context.md
    agent_prompt: wiki/outputs/evolution/dream/<run>/dream_agent_prompt.md
    agent_response: wiki/outputs/evolution/dream/<run>/dream_agent_response.json
    report: wiki/outputs/evolution/dream/<run>/dream_report.md
    apply_report_json: wiki/outputs/evolution/dream/<run>/dream_apply_report.json
    apply_report_markdown: wiki/outputs/evolution/dream/<run>/dream_apply_report.md
  contract:
    - deterministic tooling prepares memory cues only
    - a pluggable policy runtime chooses forgetting, consolidation, and
      association proposals
    - supported policy runtimes include Claude Code, OpenAI-compatible API
      models, local models, or supplied agent-response JSON
    - validation requires cited context evidence before writing proposals
    - safe auto-apply can apply medium/high-confidence proposals as reversible
      SciEvolve metadata and append-only audit notes on memory pages
    - safe applications rebuild wiki/graph/context_brief.md so later skills can
      consume applied memory guidance
    - page bodies are not rewritten; only append-only audit notes are allowed
    - graph edges, skills, schemas, and templates remain untouched
  signal_collection:
    - after run, record task signal if high rejection rate or user correction
    - propose-only runs benefit most: signals capture unapplied findings

forge:
  mode: agent-first
  default_behavior: propose-only
  artifacts:
    context_json: wiki/outputs/evolution/forge/<run>/forge_context.json
    context_markdown: wiki/outputs/evolution/forge/<run>/forge_context.md
    agent_prompt: wiki/outputs/evolution/forge/<run>/forge_agent_prompt.md
    agent_response: wiki/outputs/evolution/forge/<run>/forge_agent_response.json
    report: wiki/outputs/evolution/forge/<run>/forge_report.md
    apply_report_json: wiki/outputs/evolution/forge/<run>/forge_apply_report.json
    apply_report_markdown: wiki/outputs/evolution/forge/<run>/forge_apply_report.md
  contract:
    - deterministic tooling prepares skill content + workflow signal clusters
    - a pluggable policy runtime proposes patch-prompt, add-check,
      adjust-handoff, or add-recovery proposals
    - validation requires cited skill file paths and line hints
    - default is propose-only; --auto-apply enables additive safe mutations
    - safe auto-apply is limited to frontmatter metadata and append-only notes
    - prompt text, workflow steps, handoffs, and recovery protocols are never
      auto-applied; they require human review
    - proposals target skills in i18n/en/skills/ and .claude/skills/
  signal_collection:
    - after run, record task signal if high rejection rate or skill backlog

safety:
  default_mode: auto-apply
  no_silent_mutation:
    - skills
    - runtime schemas
    - DAG templates
    - index.md
    - log.md
  auto_apply:
    allowed_command: dream (default when --agent-response is provided)
    allowed_changes:
      - scievolve_memory_weight frontmatter
      - scievolve_consolidates_with frontmatter
      - scievolve_associations frontmatter
      - scievolve_last_dream frontmatter
      - scievolve_dream_notes frontmatter
      - tags frontmatter (append-only)
      - related_concepts / parent_topics / linked_ideas / parent_methods /
        key_papers / grounded_in frontmatter (append-only)
      - maturity frontmatter (forgetting -> deprecated only)
      - page body append-only SciEvolve Memory Evolution Note section
    requires:
      - validated agent proposal
      - medium or high confidence
      - existing target entity page
      - auditable application event
      - post-apply parse validation
      - downstream context rebuild
    opt_out: --propose-only
  yolo:
    allowed_command: dream --yolo
    allowed_changes:
      - page body merge (consolidation appends related page body into target)
      - page archive (consolidation archives related pages; forgetting archives target)
    requires:
      - validated agent proposal
      - high confidence only
      - explicit --yolo flag
      - auditable application event
      - post-apply parse validation
      - downstream context rebuild
  manual_apply_requires:
    - auditable artifact
    - visible diff or changed-path report
