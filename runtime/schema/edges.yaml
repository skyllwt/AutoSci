# -----------------------------------------------------------------------------
# bio-B2 (minimal pilot merged 2026-05-11): validation / translation edges.
# Section B2 plan: claim / paper → indication / cohort with typed metadata
# (clinical_trial_for {nct_id, phase}, fda_approved_for {indication, year},
# validates_in_species {species}). The minimal pilot registers all 3 edge types with
# confidence + evidence attributes only — typed metadata is encoded in the evidence
# string for now, structured metadata.* keys deferred until add-edge CLI is extended
# (same pattern as B3 minimal). No live edges yet: the wiki has no clinical-trial or
# FDA-approval content to anchor against. Edges become populable as /ingest (C1) lands
# bio NER for clinical-translation papers.
# -----------------------------------------------------------------------------

clinical_trial_for:
  endpoints: { from: '*', to: concepts }
  direction: directed
  workflow:  evidence
  attributes:
    confidence: { type: enum, values: [high, medium, low], required: true }
    evidence:   { type: str, required: true }
  # bio-B-infra (pilot merged 2026-05-12): typed metadata for clinical-trial provenance.
  # nct_id — ClinicalTrials.gov registration (NCT followed by 8 digits).
  # phase — trial phase (Phase 0 preclinical pilot through Phase 4 post-approval; bio
  # domain meaning per D1 disambiguation). indication — disease / cohort.
  metadata:
    nct_id:     { type: str }
    phase:      { type: enum, values: ["0", "1", "1/2", "2", "2/3", "3", "4"] }
    indication: { type: str }
    year:       { type: int }

fda_approved_for:
  endpoints: { from: '*', to: concepts }
  direction: directed
  workflow:  evidence
  attributes:
    confidence: { type: enum, values: [high, medium, low], required: true }
    evidence:   { type: str, required: true }
  # bio-B-infra (pilot merged 2026-05-12): typed metadata for FDA-approval provenance.
  metadata:
    indication:   { type: str, required: true }
    year:         { type: int }
    approval_kind: { type: enum, values: [standard, accelerated, breakthrough, fast-track] }

validates_in_species:
  endpoints: { from: '*', to: concepts }
  direction: directed
  workflow:  evidence
  attributes:
    confidence: { type: enum, values: [high, medium, low], required: true }
    evidence:   { type: str, required: true }
  # bio-B-infra (pilot merged 2026-05-12): typed metadata for species-validation
  # provenance. species — required (use lint_bio RECOGNISED_SPECIES allowlist values
  # for convergence). source_db — uniprotkb-swissprot / pubmed / interpro / etc.
  metadata:
    species:   { type: str, required: true }
    source_db: { type: str }

# -----------------------------------------------------------------------------
# Bibliographic citation
# -----------------------------------------------------------------------------

cites:
  endpoints: { from: papers, to: papers }
  direction: directed
  workflow:  citation
  attributes:
    source: { type: enum, values: [semantic_scholar, parsed_bib, manual], required: true }
    date:   { type: date }
