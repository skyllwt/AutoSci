# -----------------------------------------------------------------------------
# bio-B3 (pilot merged 2026-05-11): dataset-version provenance edge.
# Pilot scope: confidence + evidence attributes only. Version info is encoded in the
# evidence string (e.g. "version: v1; CRBN+VHL test split"). Full B3 — typed
# metadata.version as a structured attribute — is deferred until add-edge CLI is extended
# to accept --metadata or per-attribute flags (C3 lint depends on the structured form).
# Until then, version drift detection has to grep evidence text.
# -----------------------------------------------------------------------------

dataset_version_used:
  endpoints: { from: experiments, to: datasets }
  direction: directed
  workflow:  provenance
  attributes:
    confidence: { type: enum, values: [high, medium, low], required: true }
    evidence:   { type: str, required: true }
  # bio-B-infra (pilot merged 2026-05-12): typed metadata schema. Closed-set —
  # validate_edge_attributes warns on keys not listed here. Cross-checked against
  # datasets/{slug}.md::versions by tools/lint_bio.py::check_dataset_versions (3a).
  metadata:
    version:       { type: str, required: true }
    subset:        { type: str }
    accessed_date: { type: str }

# -----------------------------------------------------------------------------
# bio-B1 (minimal pilot merged 2026-05-11): bio relation edges.
# Full B1 plan registers 10 verbs (targets_protein, binds, inhibits, activates, degrades,
# phosphorylates, ubiquitinates, methylates, acetylates, is_substrate_of) connecting
# paper / claim / concept → protein, or protein → protein. The minimal pilot registers
# the two most-demoable verbs (targets_protein + ubiquitinates) with broad endpoints
# (from: '*', to: concepts) — proteins-as-concepts per the A2 light option. The remaining
# 8 verbs and tightened endpoints land in full B1.
# -----------------------------------------------------------------------------

targets_protein:
  endpoints: { from: '*', to: concepts }
  direction: directed
  workflow:  ingest
  attributes:
    confidence: { type: enum, values: [high, medium, low], required: true }
    evidence:   { type: str, required: true }

ubiquitinates:
  endpoints: { from: '*', to: concepts }
  direction: directed
  workflow:  ingest
  attributes:
    confidence: { type: enum, values: [high, medium, low], required: true }
    evidence:   { type: str, required: true }

# bio-B1 (full pilot merged 2026-05-11): remaining 8 verbs. Same endpoints + attributes
# shape as targets_protein / ubiquitinates above. Live-edge population is sparse for now —
# the wiki does not yet have kinase / phosphatase / acetyltransferase concepts to anchor
# phosphorylates / acetylates / methylates against, and most drug-target / substrate-enzyme
# pairs need bio NER (C1) for systematic extraction. Each verb is nonetheless registered
# so the SPA / lint / research_wiki can validate them and downstream skills can emit them
# once C1 lands.

binds:
  endpoints: { from: '*', to: concepts }
  direction: directed
  workflow:  ingest
  attributes:
    confidence: { type: enum, values: [high, medium, low], required: true }
    evidence:   { type: str, required: true }
  # bio-B-infra (pilot merged 2026-05-12): typed metadata for drug / PROTAC binding edges.
  # recruitment_ligand_class — imid | non-imid-crbn-binder | vhl-binder | dcaf15-binder | …
  # clinical_anchor — name of the canonical clinical molecule for context (e.g.
  # lenalidomide-pomalidomide for IMiD-class CRBN binders). kd_nM — optional binding affinity.
  metadata:
    recruitment_ligand_class: { type: str }
    clinical_anchor:          { type: str }
    kd_nM:                    { type: float }

inhibits:
  endpoints: { from: '*', to: concepts }
  direction: directed
  workflow:  ingest
  attributes:
    confidence: { type: enum, values: [high, medium, low], required: true }
    evidence:   { type: str, required: true }

