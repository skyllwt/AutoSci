# xref.yaml — Bidirectional link contract.
#
# Whenever entity A writes a forward link to entity B, the reverse update on B
# is required.  Each rule has:
#
#   forward.kind                     source entity kind
#   forward.<frontmatter_field |     where the forward link lives:
#            body_section       |       a frontmatter list field, OR
#            edge_type>                 a body section (use '*' for any), OR
#                                       a graph edge type
#   forward.target                   target entity kind
#
#   reverse.kind                     target entity kind (same as forward.target)
#   reverse.<frontmatter_field |     where the reverse update goes
#            body_section>
#   reverse.action                   append_slug | append_record
#   record                           record template (only for append_record);
#                                    {from} expands to the source slug
#
# Targets listed in `terminal_targets` (below) write no reverse. Foundations are NOT terminal.

rules:

  # papers ## Related → concepts.key_papers
  - forward: { kind: papers,      body_section: Related,         target: concepts }
    reverse: { kind: concepts,    frontmatter_field: key_papers, action: append_slug }

  # any paper-body wikilink to a person → people ## Recent work
  - forward: { kind: papers,      body_section: '*',             target: people }
    reverse: { kind: people,      body_section: "Recent work",   action: append_slug }

  # topics.key_people → people ## Research areas
  - forward: { kind: topics,      frontmatter_field: key_people, target: people }
    reverse: { kind: people,      body_section: "Research areas", action: append_slug }

  # concepts.key_papers → papers ## Related
  - forward: { kind: concepts,    frontmatter_field: key_papers, target: papers }
    reverse: { kind: papers,      body_section: Related,         action: append_slug }

  # ideas.origin_gaps → concepts.linked_ideas
  - forward: { kind: ideas,       frontmatter_field: origin_gaps, target: concepts }
    reverse: { kind: concepts,    frontmatter_field: linked_ideas, action: append_slug }

  # ideas.origin_gaps → topics.linked_ideas
  - forward: { kind: ideas,       frontmatter_field: origin_gaps, target: topics }
    reverse: { kind: topics,      frontmatter_field: linked_ideas, action: append_slug }

  # experiments.linked_idea → ideas.linked_experiments
  - forward: { kind: experiments, frontmatter_field: linked_idea, target: ideas }
    reverse: { kind: ideas,       frontmatter_field: linked_experiments, action: append_slug }

  # methods.source_papers → papers ## Related
  - forward: { kind: methods,     frontmatter_field: source_papers, target: papers }
    reverse: { kind: papers,      body_section: Related,         action: append_slug }

  # methods.parent_methods ↔ methods.child_methods (each is the other's reverse)
  - forward: { kind: methods,     frontmatter_field: parent_methods, target: methods }
    reverse: { kind: methods,     frontmatter_field: child_methods,  action: append_slug }
  - forward: { kind: methods,     frontmatter_field: child_methods,  target: methods }
    reverse: { kind: methods,     frontmatter_field: parent_methods, action: append_slug }

  # experiments.evaluates_methods → methods ## Evaluated by
  - forward: { kind: experiments, frontmatter_field: evaluates_methods, target: methods }
    reverse: { kind: methods,     body_section: "Evaluated by",        action: append_slug }

  # methods.realizes_concepts → concepts ## Realized by
  - forward: { kind: methods,     frontmatter_field: realizes_concepts, target: concepts }
    reverse: { kind: concepts,    body_section: "Realized by",          action: append_slug }

  # topics.key_papers → papers ## Related
  - forward: { kind: topics,      frontmatter_field: key_papers,        target: papers }
    reverse: { kind: papers,      body_section: Related,                action: append_slug }

  # entity.parent_topics ↔ topics.key_<kind>  (stable topic membership)
  - forward: { kind: papers,      frontmatter_field: parent_topics, target: topics }
    reverse: { kind: topics,      frontmatter_field: key_papers,      action: append_slug }
  - forward: { kind: foundations, frontmatter_field: parent_topics, target: topics }
    reverse: { kind: topics,      frontmatter_field: key_foundations, action: append_slug }
  - forward: { kind: concepts,    frontmatter_field: parent_topics, target: topics }
    reverse: { kind: topics,      frontmatter_field: key_concepts,    action: append_slug }
  - forward: { kind: methods,     frontmatter_field: parent_topics, target: topics }
    reverse: { kind: topics,      frontmatter_field: key_methods,     action: append_slug }
  - forward: { kind: people,      frontmatter_field: parent_topics, target: topics }
    reverse: { kind: topics,      frontmatter_field: key_people,      action: append_slug }

  # topics.key_<kind> → <entity>.parent_topics  (mirror of the rules above so the
  # bidirectional frontmatter pair stays consistent no matter which side is edited;
  # key_papers / key_people already reverse to body sections, so only these three)
  - forward: { kind: topics,      frontmatter_field: key_concepts,    target: concepts }
    reverse: { kind: concepts,    frontmatter_field: parent_topics,   action: append_slug }
  - forward: { kind: topics,      frontmatter_field: key_methods,     target: methods }
    reverse: { kind: methods,     frontmatter_field: parent_topics,   action: append_slug }
  - forward: { kind: topics,      frontmatter_field: key_foundations, target: foundations }
    reverse: { kind: foundations, frontmatter_field: parent_topics,   action: append_slug }

  # People contribution roles → reverse body sections on the target
  - forward: { kind: people,      frontmatter_field: key_papers,              target: papers }
    reverse: { kind: papers,      body_section: "Contributors",               action: append_slug }
  - forward: { kind: people,      frontmatter_field: contributed_methods,     target: methods }
    reverse: { kind: methods,     body_section: "Contributors",               action: append_slug }
  - forward: { kind: people,      frontmatter_field: contributed_foundations, target: foundations }
    reverse: { kind: foundations, body_section: "Contributed by people",      action: append_slug }

  # topics.parent_topics → topics ## Subtopics ; topics.related_topics → topics ## Related topics
  - forward: { kind: topics,      frontmatter_field: parent_topics,  target: topics }
    reverse: { kind: topics,      body_section: "Subtopics",         action: append_slug }
  - forward: { kind: topics,      frontmatter_field: related_topics, target: topics }
    reverse: { kind: topics,      body_section: "Related topics",    action: append_slug }

  # Foundation grounding reverses (foundations is no longer terminal)
  - forward: { kind: concepts,    frontmatter_field: grounded_in,    target: foundations }
    reverse: { kind: foundations, body_section: "Grounds concepts",  action: append_slug }
  - forward: { kind: methods,     frontmatter_field: grounded_in,    target: foundations }
    reverse: { kind: foundations, body_section: "Grounds methods",   action: append_slug }

  # Paper → Method typed edges → method body sections
  - forward: { kind: papers,      edge_type: proposes_method,        target: methods }
    reverse: { kind: methods,     body_section: "Proposed by",       action: append_slug }
  - forward: { kind: papers,      edge_type: applies_method,         target: methods }
    reverse: { kind: methods,     body_section: "Applied by",        action: append_slug }
  - forward: { kind: papers,      edge_type: extends_method,         target: methods }
    reverse: { kind: methods,     body_section: "Extended by",       action: append_slug }

  # Paper → Foundation contribution edge → foundation body section
  - forward: { kind: papers,      edge_type: contributes_to_foundation, target: foundations }
    reverse: { kind: foundations, body_section: "Contributed by papers", action: append_slug }

  # Active research memory: reviews.linked_manuscript → manuscripts ## Reviews
  - forward: { kind: reviews,     frontmatter_field: linked_manuscript, target: manuscripts }
    reverse: { kind: manuscripts, body_section: "Reviews",              action: append_slug }

terminal_targets: []
