# entities.yaml — Node contract for the wiki entity types.
#
# Field attributes:
#   type           str | int | float | bool | date | enum | object | link
#                  | list_str | list_int | list_link | list_object
#   required       boolean, default false
#   default        literal value used by `lint --fix`
#   range          [min, max] for int / float
#   values         [...] for enum
#   to             entity kind (or list of kinds) for link / list_link
#   required_when  { other_field: value } for conditional required
#   fields         nested schema for object
#   item           per-element schema for list_object
#
# `terminal: true` means the entity writes no outward links (xref reverse-rule exempt).

papers:
  dir: wiki/papers/
  fields:
    title:             { type: str, required: true }
    slug:              { type: str, required: true }
    arxiv:             { type: str }
    # bio-A3 (minimal pilot merged 2026-05-11): bio-native identifiers. Optional, additive.
    # Bio papers usually have DOI/PMID but no arXiv ID. Other A3 fields (biorxiv, pdb_ids,
    # uniprot_ids, nct_ids, gene_symbols, species) deferred — they need /ingest C1 bio NER
    # pre-pass to populate at scale; for the minimal pilot only doi+pmid are added.
    doi:               { type: str }
    pmid:              { type: str }
    venue:             { type: str }
    year:              { type: int }
    tags:              { type: list_str, required: true, default: [] }
    importance:        { type: int, range: [1, 5], required: true, default: 3 }
    date_added:        { type: date }
    source_type:       { type: enum, values: [tex, pdf] }
    s2_id:             { type: str }
    tldr:              { type: str }
    contribution_type: { type: list_str, default: [] }
    datasets:          { type: list_str, default: [] }
    code_url:          { type: str }
    cited_by:          { type: list_link, to: papers, default: [] }

concepts:
  dir: wiki/concepts/
  fields:
    title:            { type: str, required: true }
    aliases:          { type: list_str, default: [] }
    tags:             { type: list_str, required: true, default: [] }
    maturity:         { type: enum, values: [stable, active, emerging, deprecated],
                        required: true, default: active }
    definition:       { type: str }
    key_papers:       { type: list_link, to: papers, required: true, default: [] }
    first_introduced: { type: str }
    date_updated:     { type: date }
    related_concepts: { type: list_link, to: concepts, default: [] }
    linked_ideas:     { type: list_link, to: ideas, default: [] }
    # bio-A2 (light, pilot merged 2026-05-11): optional protein-anchor fields. Populate ONLY
    # when the concept IS a specific gene product (p53, CRBN, VHL, MDM2, …) — leave empty for
    # process concepts (ubiquitylation), method concepts (alphafold-db), or class concepts
    # (ubiquitin-ligase-e3). When ≥50 such concepts accumulate or graph queries demand it,
    # promote to a separate `proteins/` entity type (A2 heavy option, still drafted).
    gene_symbol:      { type: str }                # HGNC symbol, e.g. "TP53"
    uniprot_id:       { type: str }                # e.g. "P04637"
    pdb_ids:          { type: list_str, default: [] }   # representative structures
    species:          { type: list_str, default: [] }   # e.g. ["human"]

topics:
  dir: wiki/topics/
  fields:
    title:          { type: str, required: true }
    tags:           { type: list_str, required: true, default: [] }
    key_venues:     { type: list_str, default: [] }
    related_topics: { type: list_link, to: topics, default: [] }
    key_people:     { type: list_link, to: people, default: [] }
    linked_ideas:   { type: list_link, to: ideas, default: [] }

people:
  dir: wiki/people/
  fields:
    name:           { type: str, required: true }
    affiliation:    { type: str }
    research_areas: { type: list_str, default: [] }
    homepage:       { type: str }
    scholar:        { type: str }
    date_updated:   { type: date }
    type:
      type: object
      fields:
        kind:    { type: enum, values: [researcher, team, organization], default: researcher }
        subtype: { type: str }

ideas:
  dir: wiki/ideas/
  fields:
    title:              { type: str, required: true }
    slug:               { type: str, required: true }
    status:             { type: enum,
                          values: [proposed, in_progress, tested, validated, failed],
                          required: true, default: proposed }
    origin:             { type: str, required: true }
    origin_gaps:        { type: list_link, to: [concepts, topics], default: [] }
    tags:               { type: list_str, required: true, default: [] }
    target_venue:       { type: str }
    novelty_score:      { type: int, range: [1, 5] }
    priority:           { type: int, range: [1, 5], required: true, default: 3 }
    pilot_result:       { type: str }
    failure_reason:     { type: str, required_when: { status: failed } }
    linked_experiments: { type: list_link, to: experiments, default: [] }
    date_proposed:      { type: date }
    date_resolved:      { type: date }
    # bio-A7 (pilot merged 2026-05-11): optional GRADE-style overall evidence grade for the idea.
    # Coarser than per-edge grading (deferred) but immediately useful for /novelty weighting and
    # /paper-draft confidence framing. Full A7 (per-evidence-edge grade attribute) waits on
    # add-edge CLI extension.
    grade:              { type: enum, values: [very-low, low, moderate, high] }
    # bio-C3 (pilot merged 2026-05-12): optional scope object scoping where this idea applies.
    # Primary use: /ideate banlist matching — a failed idea only blocks a candidate when their
    # scopes overlap. Sub-fields are all optional and additive; empty/absent scope means
    # "universal" (legacy behaviour, treated as overlapping anything). data_regime captures
    # whether the target subspace has abundant labelled data (saturation is plausible) or
    # scarce data (saturation unlikely).
    scope:
      type: object
      fields:
        species:      { type: list_str, default: [] }
        disease_area: { type: list_str, default: [] }
        data_regime:  { type: enum, values: [high_data, low_data, mixed] }
  lifecycle:
    transitions:
      proposed:    [in_progress]
      in_progress: [tested]
      tested:      [validated, failed]

methods:
  dir: wiki/methods/
  fields:
    name:           { type: str, required: true }
    slug:           { type: str, required: true }
    type:
      type: enum
      values: [architecture, training, inference, evaluation, data, benchmark,
               system, optimization, prompting, protocol, other]
      required: true
      default: other
    tags:           { type: list_str, required: true, default: [] }
    source_papers:  { type: list_link, to: papers, default: [] }
    parent_methods: { type: list_link, to: methods, default: [] }
    child_methods:  { type: list_link, to: methods, default: [] }
    code_repo:      { type: str }
    date_updated:   { type: date }

experiments:
  dir: wiki/experiments/
  fields:
    title:           { type: str, required: true }
    slug:            { type: str, required: true }
    status:          { type: enum, values: [planned, running, completed, abandoned],
                       required: true, default: planned }
    linked_idea:     { type: link, to: ideas, required: true }
    hypothesis:      { type: str, required: true }
    tags:            { type: list_str, required: true, default: [] }
    # bio-A5 full (pilot merged 2026-05-12): setup gains bio-shaped optional fields
    # alongside the original ML-pipeline core. All new fields are optional and additive —
    # pure-ML experiments leaving them empty stay valid. in_silico_or_wet drives downstream
    # routing in /exp-design (C5 wet-lab detection) and /exp-run (C7 directory layout).
    # force_field / solvent_model / simulation_length are MD-specific. species / cell_line /
    # assay_type cover wet-lab + cross-species generalisation. weight_version captures
    # multi-version ML models (e.g. Boltz-2 Jan 2026 vs Mar 2026). random_seed_protocol
    # records the actual replication strategy (ranking-shuffle / bootstrap / LOO-CV) which
    # multi-seed alone cannot express (see C6 in the backlog).
    setup:
      type: object
      fields:
        model:                { type: str }
        dataset:              { type: str }
        hardware:             { type: str }
        framework:            { type: str }
        in_silico_or_wet:     { type: enum, values: [in_silico, wet_lab, mixed] }
        species:              { type: list_str, default: [] }
        cell_line:            { type: str }
        assay_type:           { type: str }
        force_field:          { type: str }
        solvent_model:        { type: str }
        simulation_length:    { type: str }
        weight_version:       { type: str }
        random_seed_protocol: { type: str }
    metrics:         { type: list_str, default: [] }
    baseline:        { type: str }
    outcome:         { type: enum, values: [succeeded, failed, inconclusive] }
    key_result:      { type: str }
    date_planned:    { type: date }
    date_completed:  { type: date }
    run_log:         { type: str }
    started:         { type: str }
    # bio-A6 (pilot merged 2026-05-11): estimated_hours is legacy — kept for backward
    # compatibility while live experiments migrate. New experiments should populate
    # estimated_cost instead. C3 (bio-lint) will eventually warn when only
    # estimated_hours is set on a bio-domain experiment.
    estimated_hours: { type: int }
    # bio-A6 structured cost block. All sub-fields optional and additive — pages that
    # carry only estimated_hours remain valid. md_wallclock_hours is for molecular-dynamics
    # wall-clock (often dominates GPU time on PROTAC pipelines); wet_lab_usd captures
    # wet-lab cost in USD; fte_weeks is researcher-time; dataset_access_lead_time_days
    # surfaces lead time for restricted-access cohorts.
    estimated_cost:
      type: object
      fields:
        gpu_hours:                       { type: float }
        cpu_hours:                       { type: float }
        md_wallclock_hours:              { type: float }
        wet_lab_usd:                     { type: float }
        fte_weeks:                       { type: float }
        dataset_access_lead_time_days:   { type: int }
    remote:
      type: object
      fields:
        server:    { type: str }
        gpu:       { type: str }
        session:   { type: str }
        started:   { type: str }
        completed: { type: str }
  lifecycle:
    transitions:
      planned: [running]
      running: [completed, abandoned]

Summary:
  dir: wiki/Summary/
  fields:
    title:        { type: str, required: true }
    scope:        { type: str, required: true }
    key_topics:   { type: list_link, to: topics, required: true, default: [] }
    paper_count:  { type: int }
    date_updated: { type: date }

foundations:
  dir: wiki/foundations/
  terminal: true
  fields:
    title:            { type: str, required: true }
    slug:             { type: str, required: true }
    domain:           { type: str, required: true }
    status:           { type: enum, values: [mainstream, historical],
                        required: true, default: mainstream }
    aliases:          { type: list_str, default: [] }
    first_introduced: { type: str }
    date_updated:     { type: date }
    source_url:       { type: str }

# bio-A1 (pilot merged 2026-05-11): datasets/ as 10th first-class entity. Anchors
# reusable dataset references (TernaryDB, PROTAC-DB, AlphaFold-DB, …) so that
# experiments[*].setup.dataset and papers/* mentions can wikilink to a canonical
# page with version history and access tier.
datasets:
  dir: wiki/datasets/
  fields:
    title:         { type: str, required: true }
    slug:          { type: str, required: true }
    aliases:       { type: list_str, default: [] }
    tags:          { type: list_str, required: true, default: [] }
    maturity:      { type: enum, values: [stable, active, emerging, deprecated],
                     required: true, default: stable }
    access:        { type: enum, values: [public, registration, restricted, wet-lab-derived],
                     required: true, default: public }
    # versions[]: list of {version, released, url, n_entries, notes}. Future C8
    # lint (bio) compares against experiments[*].reproducibility.dataset_versions[*].
    versions:      { type: list_object, default: [] }
    canonical_url: { type: str }
    license:       { type: str }
    key_papers:    { type: list_link, to: papers, default: [] }
    key_concepts:  { type: list_link, to: concepts, default: [] }
    date_updated:  { type: date }
